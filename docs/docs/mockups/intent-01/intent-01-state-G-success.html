<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Intent 01 — State G — Success</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Be Vietnam Pro', -apple-system, sans-serif;
    background: #FDF2F4;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 14px;
    color: #831447;
  }
  .phone-frame {
    width: 100%;
    max-width: 414px;
    height: 844px;
    max-height: calc(100vh - 48px);
    background: linear-gradient(180deg, #FCE7F0 0%, #FEEEE0 40%, #FFF8F0 100%);
    border-radius: 24px;
    overflow: hidden;
    border: 0.5px solid #F9D8E4;
    box-shadow: 0 20px 60px rgba(233,30,99,0.18);
    position: relative;
    display: flex;
    flex-direction: column;
  }
  @media (min-width: 1024px) {
    body { padding: 32px; }
    .phone-frame { box-shadow: 0 32px 80px rgba(233,30,99,0.24); max-height: calc(100vh - 64px); }
  }
  button { font-family: inherit; cursor: pointer; border: none; }
  input, textarea { font-family: inherit; outline: none; }

  @keyframes pop { 0%{transform:scale(0.96); opacity:0} 100%{transform:scale(1); opacity:1} }
  @keyframes drift { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }
  @keyframes glow { 0%,100%{opacity:0.7; transform:scale(1)} 50%{opacity:1; transform:scale(1.05)} }
  @keyframes pulseRing { 0%{transform:scale(1); opacity:0.5} 100%{transform:scale(1.6); opacity:0} }
  @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
  @keyframes spin { 0%{transform:rotate(0)} 100%{transform:rotate(360deg)} }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }
  @keyframes elastic-pop { 0%{transform:scale(0); opacity:0} 60%{transform:scale(1.2)} 100%{transform:scale(1); opacity:1} }
  @keyframes slideUp { 0%{transform:translateY(20px); opacity:0} 100%{transform:translateY(0); opacity:1} }
  .orb { animation: drift 4s ease-in-out infinite; }
  .pulse-dot { animation: glow 1.6s ease-in-out infinite; }
  .pulse-ring { animation: pulseRing 2.4s ease-out infinite; }
  .spinner { animation: spin 1s linear infinite; }
  .tile { animation: pop 0.5s ease-out backwards; }

  .status-bar {
    height: 44px;
    padding: 0 22px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    color: #831447;
    font-weight: 600;
    font-size: 14px;
    flex-shrink: 0;
  }
  .status-bar .right { display: flex; gap: 6px; align-items: center; }


  .success-content {
    flex: 1;
    padding: 20px 22px 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-y: auto;
  }
  .success-label {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: linear-gradient(135deg, #DCFCE7, #BBF7D0);
    color: #15803D;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    margin-top: 18px;
    text-transform: uppercase;
    border: 0.5px solid #BBF7D0;
  }
  .success-label .dot {
    width: 6px; height: 6px;
    background: #10B981;
    border-radius: 50%;
  }
  .success-title {
    font-size: 26px;
    font-weight: 700;
    color: #831447;
    text-align: center;
    margin-top: 14px;
    letter-spacing: -0.5px;
    line-height: 1.2;
  }
  .success-title strong {
    background: linear-gradient(135deg, #E91E63, #FB923C);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: 700;
  }
  .success-sub {
    font-size: 13px;
    color: #BE185D;
    text-align: center;
    margin-top: 8px;
    font-weight: 500;
  }
  /* Product preview card */
  .product-preview {
    width: 100%;
    margin-top: 24px;
    background: #FFFFFF;
    border-radius: 20px;
    padding: 14px;
    border: 0.5px solid #FBCFE8;
    box-shadow: 0 10px 28px rgba(233,30,99,0.15);
    position: relative;
    overflow: hidden;
    animation: slideUp 0.6s ease-out 0.3s backwards;
  }
  .product-preview::before {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 120px; height: 120px;
    background: radial-gradient(circle, rgba(251,146,60,0.15) 0%, transparent 70%);
    border-radius: 50%;
  }
  .pp-tag {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: linear-gradient(135deg, #10B981, #059669);
    color: #fff;
    padding: 4px 10px;
    border-radius: 8px;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 10px;
    box-shadow: 0 3px 8px rgba(16,185,129,0.3);
  }
  .pp-row {
    display: flex;
    gap: 14px;
    align-items: center;
  }
  .pp-thumb {
    width: 84px; height: 84px;
    border-radius: 16px;
    background: linear-gradient(135deg, #FFE4E6, #FECDD3 50%, #FED7AA);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid #fff;
    box-shadow: 0 6px 14px rgba(233,30,99,0.15);
  }
  .pp-thumb-icon {
    background: linear-gradient(135deg, #F43F5E, #E11D48);
    width: 42px; height: 42px;
    border-radius: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 10px rgba(244,63,94,0.4);
  }
  .pp-info { flex: 1; }
  .pp-title {
    font-size: 14px;
    font-weight: 700;
    color: #831447;
    line-height: 1.3;
    margin-bottom: 6px;
  }
  .pp-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-bottom: 8px;
  }
  .pp-chip {
    font-size: 10px;
    font-weight: 600;
    background: #FCE7F3;
    color: #BE185D;
    padding: 3px 7px;
    border-radius: 6px;
  }
  .pp-price {
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    font-weight: 700;
    background: linear-gradient(135deg, #FB923C, #EA580C);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  /* Stats grid */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-top: 18px;
    width: 100%;
    animation: slideUp 0.6s ease-out 0.5s backwards;
  }
  .stat-cell {
    background: rgba(255,255,255,0.7);
    border: 0.5px solid #FBCFE8;
    border-radius: 12px;
    padding: 10px 8px;
    text-align: center;
    backdrop-filter: blur(8px);
  }
  .stat-cell-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    font-weight: 700;
    background: linear-gradient(135deg, #E91E63, #FB923C);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .stat-cell-label {
    font-size: 9px;
    color: #BE185D;
    font-weight: 600;
    margin-top: 3px;
    letter-spacing: 0.3px;
  }
  /* CTAs */
  .ctas {
    width: 100%;
    margin-top: 28px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    animation: slideUp 0.6s ease-out 0.7s backwards;
  }
  .btn-primary {
    width: 100%;
    background: linear-gradient(135deg, #E91E63 0%, #F43F5E 50%, #FB923C 100%);
    color: #fff;
    padding: 16px 20px;
    border-radius: 16px;
    font-size: 15px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    box-shadow: 0 10px 22px rgba(233,30,99,0.35);
    letter-spacing: -0.2px;
  }
  .btn-secondary {
    width: 100%;
    background: #FFFFFF;
    color: #BE185D;
    padding: 14px 20px;
    border-radius: 16px;
    font-size: 14px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    border: 0.5px solid #FBCFE8;
  }
  .success-id {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: #BE185D;
    margin-top: 14px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-weight: 600;
  }
  .success-id .dot {
    width: 6px; height: 6px;
    background: #10B981;
    border-radius: 50%;
    animation: glow 1.6s ease-in-out infinite;
  }

</style>
</head>
