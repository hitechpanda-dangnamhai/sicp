<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>ICP — Golden Reference Design v3</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.20.0/dist/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Be Vietnam Pro', -apple-system, sans-serif;
    background: #FDF2F4;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 24px 14px;
    color: #831447;
  }
  .phone-frame {
    width: 100%;
    max-width: 414px;
    background: linear-gradient(180deg, #FCE7F0 0%, #FEEEE0 40%, #FFF8F0 100%);
    border-radius: 24px;
    overflow: hidden;
    border: 0.5px solid #F9D8E4;
    box-shadow: 0 20px 60px rgba(233,30,99,0.18);
  }
  @media (min-width: 1024px) {
    body { padding: 32px; }
    .phone-frame { box-shadow: 0 32px 80px rgba(233,30,99,0.24); }
  }
  button { font-family: inherit; cursor: pointer; }
  input { font-family: inherit; }
  
  @keyframes pop { 0%{transform:scale(0.96); opacity:0} 100%{transform:scale(1); opacity:1} }
  @keyframes drift { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }
  @keyframes glow { 0%,100%{opacity:0.7; transform:scale(1)} 50%{opacity:1; transform:scale(1.05)} }
  @keyframes pulseRing { 0%{transform:scale(1); opacity:0.6} 100%{transform:scale(1.6); opacity:0} }
  .orb { animation: drift 4s ease-in-out infinite; }
  .pulse-dot { animation: glow 1.6s ease-in-out infinite; }
  .pulse-ring { animation: pulseRing 2.4s ease-out infinite; }
  .tile { animation: pop 0.5s ease-out backwards; }
  
  .hero-bg { background: linear-gradient(135deg, #E91E63 0%, #EC4899 40%, #F472B6 75%, #FB923C 100%); }
  
  .grad-text-amber {
    background: linear-gradient(135deg, #FEF3C7, #FCD34D);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
</style>
</head>
<body>

<div class="phone-frame">

  <!-- HEADER -->
  <div style="padding:14px 18px 0; display:flex; justify-content:space-between; align-items:center;">
    <div style="display:flex; align-items:center; gap:10px;">
      <div style="width:36px; height:36px; background:linear-gradient(135deg, #E91E63, #EC4899); border-radius:11px; display:flex; align-items:center; justify-content:center; box-shadow:0 6px 14px rgba(233,30,99,0.35);">
        <i class="ti ti-sparkles" style="color:#fff; font-size:19px;"></i>
      </div>
      <div>
        <div style="font-size:14px; color:#831447; font-weight:700; letter-spacing:-0.2px;">ICP</div>
        <div style="font-size:10px; color:#BE185D; font-weight:500;">Trợ lý kinh doanh thông minh</div>
      </div>
    </div>
    <div style="display:flex; gap:8px; align-items:center;">
      <button aria-label="notify" style="background:#FFFFFF; border:0.5px solid #FBCFE8; width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; position:relative; box-shadow:0 2px 8px rgba(233,30,99,0.1);">
        <i class="ti ti-bell" style="font-size:17px; color:#BE185D;"></i>
        <span style="position:absolute; top:5px; right:5px; background:#F97316; width:7px; height:7px; border-radius:50%; border:1.5px solid #fff;"></span>
      </button>
      <div style="width:36px; height:36px; background:linear-gradient(135deg, #FB923C, #EA580C); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; color:#fff; font-weight:500; box-shadow:0 4px 10px rgba(234,88,12,0.25);">AN</div>
    </div>
  </div>

  <!-- HERO CARD -->
  <div class="hero-bg" style="margin:14px; padding:20px 18px; border-radius:24px; position:relative; overflow:hidden; box-shadow:0 16px 36px rgba(233,30,99,0.28);">
    <div style="position:absolute; top:-50px; right:-50px; width:200px; height:200px; background:radial-gradient(circle, rgba(251,146,60,0.4), transparent 65%); border-radius:50%;"></div>
    <div style="position:absolute; bottom:-60px; left:-40px; width:160px; height:160px; background:radial-gradient(circle, rgba(255,255,255,0.2), transparent 60%); border-radius:50%;"></div>
    <div style="position:absolute; top:20px; right:30px; width:6px; height:6px; background:#fff; border-radius:50%; opacity:0.6;"></div>
    <div style="position:absolute; top:50px; right:70px; width:4px; height:4px; background:#fff; border-radius:50%; opacity:0.4;"></div>
    <div style="position:absolute; bottom:80px; right:20px; width:5px; height:5px; background:#fff; border-radius:50%; opacity:0.5;"></div>
    
    <div style="position:relative; display:flex; align-items:flex-start; gap:14px; margin-bottom:18px;">
      <div style="position:relative; width:60px; height:60px; flex-shrink:0;">
        <div class="pulse-ring" style="position:absolute; inset:0; border-radius:50%; border:2px solid rgba(255,255,255,0.5);"></div>
        <div class="orb" style="position:relative; width:60px; height:60px; background:radial-gradient(circle at 30% 30%, #FFF 0%, #FFE4E6 30%, #FB923C 100%); border-radius:50%; display:flex; align-items:center; justify-content:center; box-shadow:0 12px 28px rgba(190,24,93,0.4), inset 0 -8px 18px rgba(190,24,93,0.2);">
          <i class="ti ti-sparkles" style="color:#BE185D; font-size:26px;"></i>
        </div>
      </div>
      <div style="flex:1; padding-top:4px;">
        <div style="font-size:11px; color:rgba(255,255,255,0.9); font-weight:500; margin-bottom:5px; display:flex; align-items:center; gap:5px; letter-spacing:0.4px;">
          <span class="pulse-dot" style="width:7px; height:7px; background:#FCD34D; border-radius:50%; box-shadow:0 0 8px rgba(252,211,77,0.8);"></span>
          AI VỪA PHÁT HIỆN
        </div>
        <div style="font-size:18px; color:#FFFFFF; font-weight:700; line-height:1.3; letter-spacing:-0.3px; margin-bottom:5px;">
          Doanh thu tuần này giảm <span class="grad-text-amber">12%</span>
        </div>
        <div style="font-size:12px; color:rgba(255,255,255,0.85); line-height:1.4;">
          Tôi tìm ra 2 nguyên nhân chính. Anh xem thử nhé?
        </div>
      </div>
    </div>

    <div style="position:relative; display:flex; gap:8px;">
      <button style="flex:1; background:#FFFFFF; border:none; color:#BE185D; padding:12px; border-radius:14px; font-size:13px; font-weight:700; display:flex; align-items:center; justify-content:center; gap:6px; box-shadow:0 6px 16px rgba(0,0,0,0.12);">
        <i class="ti ti-chart-line" style="font-size:15px;"></i>
        Xem phân tích
      </button>
      <button style="background:rgba(255,255,255,0.2); backdrop-filter:blur(10px); border:0.5px solid rgba(255,255,255,0.35); color:#FFFFFF; padding:12px 18px; border-radius:14px; font-size:13px; font-weight:500;">
        Để sau
      </button>
    </div>
  </div>

  <!-- STAT BAR -->
  <div style="padding:0 14px 14px;">
    <div style="background:#FFFFFF; border:0.5px solid #FBCFE8; border-radius:18px; padding:12px 14px; box-shadow:0 6px 18px rgba(233,30,99,0.08); display:flex; align-items:center; gap:10px;">
      <div style="display:flex; align-items:center; gap:5px; padding-right:12px; border-right:0.5px solid #FCE7F3; flex:1;">
        <div style="width:32px; height:32px; background:linear-gradient(135deg, #FCE7F3, #FBCFE8); border-radius:10px; display:flex; align-items:center; justify-content:center;">
          <i class="ti ti-receipt" style="font-size:16px; color:#BE185D;"></i>
        </div>
        <div>
          <div style="font-size:14px; color:#831447; font-weight:700; font-family:'JetBrains Mono', monospace; letter-spacing:-0.3px;">8</div>
          <div style="font-size:9px; color:#9F1239; font-weight:500;">đơn hôm nay</div>
        </div>
      </div>
      <div style="display:flex; align-items:center; gap:5px; padding-right:12px; border-right:0.5px solid #FCE7F3; flex:1;">
        <div style="width:32px; height:32px; background:linear-gradient(135deg, #FFEDD5, #FED7AA); border-radius:10px; display:flex; align-items:center; justify-content:center;">
          <i class="ti ti-trending-up" style="font-size:16px; color:#C2410C;"></i>
        </div>
        <div>
          <div style="font-size:14px; color:#7C2D12; font-weight:700; font-family:'JetBrains Mono', monospace; letter-spacing:-0.3px;">2.4<span style="font-size:10px; color:#9A3412;">M</span></div>
          <div style="font-size:9px; color:#9A3412; font-weight:500;">doanh thu</div>
        </div>
      </div>
      <div style="display:flex; align-items:center; gap:5px; flex:1;">
        <div style="width:32px; height:32px; background:linear-gradient(135deg, #FEF3C7, #FCD34D); border-radius:10px; display:flex; align-items:center; justify-content:center;">
          <i class="ti ti-package" style="font-size:16px; color:#92400E;"></i>
        </div>
        <div>
          <div style="font-size:14px; color:#78350F; font-weight:700; font-family:'JetBrains Mono', monospace; letter-spacing:-0.3px;">142</div>
          <div style="font-size:9px; color:#92400E; font-weight:500;">tồn kho</div>
        </div>
      </div>
    </div>
  </div>

  <!-- SECTION HEADER -->
  <div style="padding:0 18px 8px; display:flex; justify-content:space-between; align-items:center;">
    <div style="font-size:13px; color:#831447; font-weight:600; letter-spacing:-0.2px;">Bắt đầu nhanh</div>
    <button style="background:transparent; border:none; font-size:11px; color:#EC4899; font-weight:600; display:flex; align-items:center; gap:2px;">
      Tất cả <i class="ti ti-chevron-right" style="font-size:13px;"></i>
    </button>
  </div>

  <!-- 2 HERO TILES -->
  <div style="padding:0 14px; display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:12px;">

    <button class="tile" style="animation-delay:0.05s; background:linear-gradient(160deg, #FFFFFF, #FFF1F5); border:0.5px solid #FBCFE8; border-radius:20px; padding:14px; text-align:left; min-height:158px; display:flex; flex-direction:column; justify-content:space-between; position:relative; overflow:hidden; box-shadow:0 8px 22px rgba(233,30,99,0.1);">
      <div style="position:absolute; top:-30px; right:-30px; width:120px; height:120px; background:radial-gradient(circle, rgba(244,63,94,0.2), transparent 65%); border-radius:50%;"></div>
      <div style="position:absolute; bottom:-25px; left:-20px; width:80px; height:80px; background:radial-gradient(circle, rgba(251,146,60,0.12), transparent 70%); border-radius:50%;"></div>
      <div style="position:relative; display:flex; align-items:flex-start; justify-content:space-between;">
        <div style="width:46px; height:46px; background:linear-gradient(135deg, #F43F5E, #E11D48); border-radius:14px; display:flex; align-items:center; justify-content:center; box-shadow:0 8px 18px rgba(244,63,94,0.4);">
          <i class="ti ti-camera-plus" style="color:#fff; font-size:22px;"></i>
        </div>
        <span style="font-size:9px; background:linear-gradient(135deg, #F97316, #EA580C); color:#FFFFFF; padding:3px 9px; border-radius:8px; font-weight:700; letter-spacing:0.3px; box-shadow:0 4px 10px rgba(234,88,12,0.3);">HOT</span>
      </div>
      <div style="position:relative;">
        <div style="font-size:15px; color:#831447; font-weight:700; margin-bottom:3px; letter-spacing:-0.2px;">Nhập hàng</div>
        <div style="font-size:11px; color:#BE185D; line-height:1.4; margin-bottom:10px;">Chụp ảnh là có ngay</div>
        <div style="display:flex; align-items:center; gap:8px; padding-top:8px; border-top:0.5px dashed rgba(190,24,93,0.25);">
          <div style="background:#FCE7F3; padding:3px 7px; border-radius:6px; display:flex; align-items:center; gap:3px;">
            <i class="ti ti-bolt" style="font-size:11px; color:#BE185D;"></i>
            <span style="font-size:10px; color:#831447; font-weight:600;">5 giây</span>
          </div>
          <span style="font-size:10px; color:#9F1239;">/ sản phẩm</span>
        </div>
      </div>
    </button>

    <button class="tile" style="animation-delay:0.1s; background:linear-gradient(160deg, #FFFFFF, #FFF7ED); border:0.5px solid #FED7AA; border-radius:20px; padding:14px; text-align:left; min-height:158px; display:flex; flex-direction:column; justify-content:space-between; position:relative; overflow:hidden; box-shadow:0 8px 22px rgba(234,88,12,0.08);">
      <div style="position:absolute; top:-30px; right:-30px; width:120px; height:120px; background:radial-gradient(circle, rgba(251,146,60,0.22), transparent 65%); border-radius:50%;"></div>
      <div style="position:absolute; bottom:-25px; left:-20px; width:80px; height:80px; background:radial-gradient(circle, rgba(233,30,99,0.1), transparent 70%); border-radius:50%;"></div>
      <div style="position:relative; display:flex; align-items:flex-start; justify-content:space-between;">
        <div style="width:46px; height:46px; background:linear-gradient(135deg, #FB923C, #EA580C); border-radius:14px; display:flex; align-items:center; justify-content:center; box-shadow:0 8px 18px rgba(234,88,12,0.4);">
          <i class="ti ti-chart-arcs" style="color:#fff; font-size:22px;"></i>
        </div>
        <span style="font-size:9px; background:linear-gradient(135deg, #E91E63, #BE185D); color:#fff; padding:3px 9px; border-radius:8px; font-weight:700; letter-spacing:0.3px; box-shadow:0 4px 10px rgba(190,24,93,0.3);">AI</span>
      </div>
      <div style="position:relative;">
        <div style="font-size:15px; color:#7C2D12; font-weight:700; margin-bottom:3px; letter-spacing:-0.2px;">Phân tích</div>
        <div style="font-size:11px; color:#9A3412; line-height:1.4; margin-bottom:6px;">Trend, doanh thu, tồn kho</div>
        <svg viewBox="0 0 120 28" width="100%" height="28" style="display:block;">
          <defs><linearGradient id="ga" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#EA580C" stop-opacity="0.4"/><stop offset="100%" stop-color="#EA580C" stop-opacity="0"/></linearGradient></defs>
          <path d="M2,22 L20,18 L38,20 L56,12 L74,15 L92,7 L118,3" stroke="#EA580C" stroke-width="2" fill="none" stroke-linecap="round"/>
          <path d="M2,22 L20,18 L38,20 L56,12 L74,15 L92,7 L118,3 L118,28 L2,28 Z" fill="url(#ga)"/>
          <circle cx="118" cy="3" r="3.5" fill="#E91E63"/>
          <circle cx="118" cy="3" r="6" fill="#E91E63" opacity="0.25"/>
        </svg>
      </div>
    </button>

  </div>

  <!-- LIST CARD 4 ROWS -->
  <div style="padding:0 14px 4px;">
    <div style="background:#FFFFFF; border:0.5px solid #FBCFE8; border-radius:20px; padding:5px; box-shadow:0 8px 24px rgba(233,30,99,0.08);">

      <button class="tile" style="animation-delay:0.15s; width:100%; background:transparent; border:none; display:flex; align-items:center; gap:12px; padding:12px; border-radius:14px; text-align:left;">
        <div style="width:46px; height:46px; background:linear-gradient(135deg, #FCE7F3, #FBCFE8); border-radius:13px; display:flex; align-items:center; justify-content:center; flex-shrink:0; box-shadow:0 6px 14px rgba(236,72,153,0.18);">
          <i class="ti ti-search" style="font-size:22px; color:#BE185D;"></i>
        </div>
        <div style="flex:1; min-width:0;">
          <div style="font-size:14px; color:#831447; font-weight:600; letter-spacing:-0.1px; margin-bottom:3px;">Tìm sản phẩm</div>
          <div style="display:flex; align-items:center; gap:6px;">
            <span style="font-size:10px; color:#BE185D; background:#FCE7F3; padding:2px 7px; border-radius:6px; font-weight:600;">Gõ hoặc nói</span>
            <span style="font-size:10px; color:#9F1239;">50+ mặt hàng</span>
          </div>
        </div>
        <div style="background:linear-gradient(135deg, #FCE7F3, #FBCFE8); border-radius:11px; width:32px; height:32px; display:flex; align-items:center; justify-content:center;">
          <i class="ti ti-chevron-right" style="font-size:15px; color:#BE185D;"></i>
        </div>
      </button>

      <div style="height:0.5px; background:#FCE7F3; margin:0 14px;"></div>

      <button class="tile" style="animation-delay:0.2s; width:100%; background:transparent; border:none; display:flex; align-items:center; gap:12px; padding:12px; border-radius:14px; text-align:left;">
        <div style="width:46px; height:46px; background:linear-gradient(135deg, #FFEDD5, #FED7AA); border-radius:13px; display:flex; align-items:center; justify-content:center; flex-shrink:0; box-shadow:0 6px 14px rgba(251,146,60,0.22);">
          <i class="ti ti-shopping-bag" style="font-size:22px; color:#C2410C;"></i>
        </div>
        <div style="flex:1; min-width:0;">
          <div style="font-size:14px; color:#831447; font-weight:600; letter-spacing:-0.1px; margin-bottom:3px;">Mua hàng</div>
          <div style="display:flex; align-items:center; gap:6px;">
            <span style="font-size:10px; color:#C2410C; background:#FFEDD5; padding:2px 7px; border-radius:6px; font-weight:600;">Cho khách</span>
            <span style="font-size:10px; color:#9F1239;">Voice + Text</span>
          </div>
        </div>
        <div style="background:linear-gradient(135deg, #FFEDD5, #FED7AA); border-radius:11px; width:32px; height:32px; display:flex; align-items:center; justify-content:center;">
          <i class="ti ti-chevron-right" style="font-size:15px; color:#C2410C;"></i>
        </div>
      </button>

      <div style="height:0.5px; background:#FCE7F3; margin:0 14px;"></div>

      <button class="tile" style="animation-delay:0.25s; width:100%; background:transparent; border:none; display:flex; align-items:center; gap:12px; padding:12px; border-radius:14px; text-align:left;">
        <div style="width:46px; height:46px; background:linear-gradient(135deg, #FFE4E6, #FECDD3); border-radius:13px; display:flex; align-items:center; justify-content:center; flex-shrink:0; box-shadow:0 6px 14px rgba(244,63,94,0.22);">
          <i class="ti ti-bulb" style="font-size:22px; color:#BE123C;"></i>
        </div>
        <div style="flex:1; min-width:0;">
          <div style="font-size:14px; color:#831447; font-weight:600; letter-spacing:-0.1px; margin-bottom:3px; display:flex; align-items:center; gap:6px;">
            Gợi ý sản phẩm
            <span style="font-size:9px; background:linear-gradient(135deg, #E91E63, #FB923C); color:#fff; padding:2px 7px; border-radius:6px; font-weight:700; letter-spacing:0.3px;">AI</span>
          </div>
          <div style="display:flex; align-items:center; gap:6px;">
            <span style="font-size:10px; color:#BE123C; background:#FFE4E6; padding:2px 7px; border-radius:6px; font-weight:600;">Chụp ảnh</span>
            <span style="font-size:10px; color:#9F1239;">→ 10 gợi ý</span>
          </div>
        </div>
        <div style="background:linear-gradient(135deg, #FFE4E6, #FECDD3); border-radius:11px; width:32px; height:32px; display:flex; align-items:center; justify-content:center;">
          <i class="ti ti-chevron-right" style="font-size:15px; color:#BE123C;"></i>
        </div>
      </button>

      <div style="height:0.5px; background:#FCE7F3; margin:0 14px;"></div>

      <button class="tile" style="animation-delay:0.3s; width:100%; background:transparent; border:none; display:flex; align-items:center; gap:12px; padding:12px; border-radius:14px; text-align:left;">
        <div style="width:46px; height:46px; background:linear-gradient(135deg, #FBCFE8, #F9A8D4); border-radius:13px; display:flex; align-items:center; justify-content:center; flex-shrink:0; position:relative; box-shadow:0 6px 14px rgba(236,72,153,0.28);">
          <i class="ti ti-shopping-cart" style="font-size:22px; color:#9F1239;"></i>
          <span style="position:absolute; top:-5px; right:-5px; background:linear-gradient(135deg, #F97316, #EA580C); color:#fff; min-width:20px; height:20px; padding:0 6px; border-radius:10px; font-size:11px; font-weight:700; display:flex; align-items:center; justify-content:center; border:2px solid #fff; box-shadow:0 4px 10px rgba(234,88,12,0.4);">3</span>
        </div>
        <div style="flex:1; min-width:0;">
          <div style="font-size:14px; color:#831447; font-weight:600; letter-spacing:-0.1px; margin-bottom:3px;">Giỏ hàng</div>
          <div style="display:flex; align-items:center; gap:6px;">
            <span style="font-size:11px; color:#BE123C; font-weight:700; font-family:'JetBrains Mono', monospace;">100.000 ₫</span>
            <span style="font-size:10px; color:#9F1239;">· 3 món</span>
          </div>
        </div>
        <div style="background:linear-gradient(135deg, #FBCFE8, #F9A8D4); border-radius:11px; width:32px; height:32px; display:flex; align-items:center; justify-content:center;">
          <i class="ti ti-chevron-right" style="font-size:15px; color:#9F1239;"></i>
        </div>
      </button>

    </div>
  </div>

  <!-- INPUT BAR -->
  <div style="padding:14px 14px 12px;">
    <div style="display:flex; gap:8px; align-items:center; background:linear-gradient(135deg, #FFFFFF, #FEF3F8); border:0.5px solid #FBCFE8; border-radius:30px; padding:6px 6px 6px 18px; box-shadow:0 10px 26px rgba(233,30,99,0.15);">
      <i class="ti ti-sparkles" style="color:#E91E63; font-size:18px;"></i>
      <input style="flex:1; background:transparent; border:none; font-size:13px; outline:none; color:#831447;" placeholder="Hỏi tôi bất cứ điều gì..." />
      <button aria-label="image" style="background:#FCE7F3; border:none; width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#BE185D;">
        <i class="ti ti-camera" style="font-size:18px;"></i>
      </button>
      <button aria-label="voice" style="background:linear-gradient(135deg, #E91E63, #F43F5E 50%, #FB923C); border:none; color:#fff; width:42px; height:42px; border-radius:50%; display:flex; align-items:center; justify-content:center; box-shadow:0 10px 22px rgba(233,30,99,0.5);">
        <i class="ti ti-microphone" style="font-size:20px;"></i>
      </button>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <div style="display:flex; padding:8px 4px 12px; background:#FFFFFF; border-top:0.5px solid #FCE7F3;">
    <button style="flex:1; background:transparent; border:none; display:flex; flex-direction:column; align-items:center; gap:3px; padding:4px; position:relative;">
      <div style="position:absolute; top:-2px; width:22px; height:3px; background:linear-gradient(90deg, #E91E63, #FB923C); border-radius:2px;"></div>
      <i class="ti ti-home" style="font-size:22px; color:#E91E63;"></i>
      <span style="font-size:10px; color:#BE185D; font-weight:700;">Trang chính</span>
    </button>
    <button style="flex:1; background:transparent; border:none; display:flex; flex-direction:column; align-items:center; gap:3px; padding:4px;">
      <div style="height:3px;"></div>
      <i class="ti ti-message-circle" style="font-size:22px; color:#D1D5DB;"></i>
      <span style="font-size:10px; color:#9CA3AF;">Trò chuyện</span>
    </button>
    <button style="flex:1; background:transparent; border:none; display:flex; flex-direction:column; align-items:center; gap:3px; padding:4px; position:relative;">
      <div style="height:3px;"></div>
      <i class="ti ti-inbox" style="font-size:22px; color:#D1D5DB;"></i>
      <span style="font-size:10px; color:#9CA3AF;">Đề xuất</span>
      <span style="position:absolute; top:0; right:14px; background:linear-gradient(135deg, #F97316, #EA580C); color:#fff; font-size:10px; min-width:18px; height:18px; border-radius:9px; padding:0 5px; display:flex; align-items:center; justify-content:center; font-weight:700; border:2px solid #fff;">2</span>
    </button>
    <button style="flex:1; background:transparent; border:none; display:flex; flex-direction:column; align-items:center; gap:3px; padding:4px;">
      <div style="height:3px;"></div>
      <i class="ti ti-user" style="font-size:22px; color:#D1D5DB;"></i>
      <span style="font-size:10px; color:#9CA3AF;">Cửa hàng</span>
    </button>
  </div>

</div>

</body>
</html>
