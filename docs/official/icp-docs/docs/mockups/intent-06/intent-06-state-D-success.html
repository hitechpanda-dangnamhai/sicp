<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Intent 06 — Success</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Be Vietnam Pro', -apple-system, sans-serif;
    background: #FDF2F4;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 24px 14px;
    color: #831447;
  }
  .phone-frame {
    width: 100%;
    max-width: 414px;
    background: linear-gradient(180deg, #FCE7F0 0%, #FEEEE0 40%, #FFF8F0 100%);
    border-radius: 24px;
    overflow: hidden;
    border: 0.5px solid #F9D8E4;
    box-shadow: 0 20px 60px rgba(233,30,99,0.18);
    display: flex;
    flex-direction: column;
    min-height: 844px;
    position: relative;
  }
  @media (min-width: 1024px) {
    body { padding: 32px; }
    .phone-frame { box-shadow: 0 32px 80px rgba(233,30,99,0.24); }
  }
  button { font-family: inherit; cursor: pointer; }
  input { font-family: inherit; }

  @keyframes pop { 0%{transform:scale(0.95); opacity:0} 100%{transform:scale(1); opacity:1} }
  @keyframes slideUp { 0%{transform:translateY(10px); opacity:0} 100%{transform:translateY(0); opacity:1} }
  @keyframes sheetUp { 0%{transform:translateY(100%)} 100%{transform:translateY(0)} }
  @keyframes brainGlow { 0%,100%{opacity:0.4} 50%{opacity:0.7} }
  @keyframes brainGlowStrong { 0%,100%{opacity:0.5; transform:scale(1)} 50%{opacity:0.9; transform:scale(1.1)} }
  @keyframes nodePulse { 0%,100%{transform:scale(1); opacity:0.7} 50%{transform:scale(1.4); opacity:1} }
  @keyframes drift { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }
  @keyframes spin { 100%{transform:rotate(360deg)} }
  @keyframes wave { 0%,100%{transform:scaleY(0.4)} 50%{transform:scaleY(1)} }
  @keyframes pulseRing { 0%{transform:scale(1); opacity:0.5} 100%{transform:scale(1.6); opacity:0} }
  @keyframes checkPop { 0%{transform:scale(0)} 60%{transform:scale(1.2)} 100%{transform:scale(1)} }
  @keyframes confettiFall { 0%{transform:translateY(-10px) rotate(0); opacity:0} 30%{opacity:1} 100%{transform:translateY(60px) rotate(360deg); opacity:0} }
  @keyframes countdown { 0%{stroke-dashoffset:0} 100%{stroke-dashoffset:283} }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-3px)} 40%,80%{transform:translateX(3px)} }

  .pop { animation: pop 0.5s ease-out backwards; }
  .slide-up { animation: slideUp 0.4s ease-out backwards; }
  .sheet-up { animation: sheetUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
  .drift { animation: drift 4s ease-in-out infinite; }
  .spin { animation: spin 1s linear infinite; }
  .pulse-ring { animation: pulseRing 2s ease-out infinite; }
  .check-pop { animation: checkPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
  .shake { animation: shake 0.5s ease-out; }

  .ico { width: 1em; height: 1em; display: inline-block; vertical-align: -0.125em; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
</style>
</head>
<body>
