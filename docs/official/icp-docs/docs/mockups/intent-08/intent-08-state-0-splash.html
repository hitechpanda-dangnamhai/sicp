<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Intent 08 — Splash (AI Brain)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Be Vietnam Pro', -apple-system, sans-serif;
    background: #FDF2F4;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 24px 14px;
    color: #831447;
  }
  .phone-frame {
    width: 100%;
    max-width: 414px;
    background: linear-gradient(180deg, #FCE7F0 0%, #FEEEE0 40%, #FFF8F0 100%);
    border-radius: 24px;
    overflow: hidden;
    border: 0.5px solid #F9D8E4;
    box-shadow: 0 20px 60px rgba(233,30,99,0.18);
    display: flex;
    flex-direction: column;
    min-height: 844px;
    position: relative;
  }
  @media (min-width: 1024px) {
    body { padding: 32px; }
    .phone-frame { box-shadow: 0 32px 80px rgba(233,30,99,0.24); }
  }
  button { font-family: inherit; cursor: pointer; }

  @keyframes brainGlow { 0%,100%{opacity:0.4; transform:scale(1)} 50%{opacity:0.8; transform:scale(1.1)} }
  @keyframes nodePulse { 0%,100%{transform:scale(1); opacity:0.7} 50%{transform:scale(1.5); opacity:1} }
  @keyframes pop { 0%{transform:scale(0.92); opacity:0} 100%{transform:scale(1); opacity:1} }
  @keyframes slideUp { 0%{transform:translateY(12px); opacity:0} 100%{transform:translateY(0); opacity:1} }
  @keyframes bumpBtn { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-2px)} }

  .pop { animation: pop 0.7s ease-out backwards; }
  .slide-up { animation: slideUp 0.6s ease-out backwards; }
  .btn-bump { animation: bumpBtn 2.4s ease-in-out infinite; }
</style>
</head>
<body>

<div class="phone-frame">

  <!-- STATUS BAR (mock) -->
  <div style="display:flex; justify-content:space-between; align-items:center; padding:14px 22px 0; font-family:'JetBrains Mono', monospace; font-size:13px; font-weight:700; color:#831447; flex-shrink:0;">
    <span>9:41</span>
    <div style="display:flex; gap:6px; align-items:center;">
      <svg width="16" height="11" viewBox="0 0 16 11" fill="none">
        <rect x="0" y="6" width="2" height="4" rx="0.5" fill="#831447"/>
        <rect x="4" y="4" width="2" height="6" rx="0.5" fill="#831447"/>
        <rect x="8" y="2" width="2" height="8" rx="0.5" fill="#831447"/>
        <rect x="12" y="0" width="2" height="10" rx="0.5" fill="#831447"/>
      </svg>
      <svg width="14" height="10" viewBox="0 0 14 10" fill="none">
        <path d="M7 9.5 L1 4 a8 8 0 0 1 12 0z" stroke="#831447" stroke-width="1.2" fill="none" stroke-linejoin="round"/>
      </svg>
      <div style="width:22px; height:11px; border:1px solid #831447; border-radius:3px; padding:1px; position:relative;">
        <div style="width:80%; height:100%; background:#831447; border-radius:1px;"></div>
        <div style="position:absolute; right:-3px; top:3px; width:2px; height:5px; background:#831447; border-radius:0 1px 1px 0;"></div>
      </div>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:30px 24px 60px; text-align:center; position:relative;">

    <!-- BRAIN -->
    <div class="pop" style="margin-bottom:36px;">
      <svg width="240" height="240" viewBox="0 0 240 240">
        <defs>
          <radialGradient id="brainCore" cx="40%" cy="35%">
            <stop offset="0%" stop-color="#FFE4E6"/>
            <stop offset="60%" stop-color="#F9A8D4"/>
            <stop offset="100%" stop-color="#BE185D"/>
          </radialGradient>
          <radialGradient id="aura" cx="50%" cy="50%">
            <stop offset="0%" stop-color="rgba(233,30,99,0.4)"/>
            <stop offset="60%" stop-color="rgba(251,146,60,0.2)"/>
            <stop offset="100%" stop-color="rgba(251,146,60,0)"/>
          </radialGradient>
          <radialGradient id="brainHighlight" cx="35%" cy="30%">
            <stop offset="0%" stop-color="rgba(255,255,255,0.7)"/>
            <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
          </radialGradient>
        </defs>

        <circle cx="120" cy="120" r="106" fill="url(#aura)" style="animation:brainGlow 3s ease-in-out infinite;"/>

        <path d="M 77 104 Q 69 86 86 77 Q 94 65 111 70 Q 120 58 132 66 Q 154 62 158 85 Q 172 94 162 111 Q 172 128 158 140 Q 154 158 132 158 Q 120 172 108 158 Q 86 158 82 140 Q 69 128 77 111 Z"
              fill="url(#brainCore)" filter="drop-shadow(0 12px 26px rgba(190,24,93,0.4))"/>

        <path d="M 80 90 Q 110 100 140 90 Q 158 92 158 100 Q 158 108 140 108 Q 110 105 80 100 Z"
              fill="url(#brainHighlight)" opacity="0.55"/>

        <path d="M 94 86 Q 120 95 137 86 M 86 112 Q 120 120 154 112 M 94 137 Q 120 130 137 137 M 120 72 Q 120 95 120 112 M 102 86 Q 106 120 102 146 M 137 86 Q 134 120 137 146"
              fill="none" stroke="#fff" stroke-width="1.4" stroke-linecap="round" opacity="0.7"/>

        <circle cx="94" cy="86" r="3" fill="#fff"/>
        <circle cx="137" cy="86" r="3" fill="#fff"/>
        <circle cx="120" cy="112" r="3" fill="#fff"/>
        <circle cx="102" cy="137" r="3" fill="#fff"/>
        <circle cx="137" cy="137" r="3" fill="#fff"/>

        <circle cx="34" cy="72" r="4.5" fill="#E91E63" style="animation:nodePulse 2s ease-in-out infinite;"/>
        <circle cx="34" cy="72" r="7" fill="#E91E63" opacity="0.25" style="animation:nodePulse 2s ease-in-out infinite;"/>

        <circle cx="206" cy="86" r="4.5" fill="#FB923C" style="animation:nodePulse 2s ease-in-out infinite 0.5s;"/>
        <circle cx="206" cy="86" r="7" fill="#FB923C" opacity="0.25" style="animation:nodePulse 2s ease-in-out infinite 0.5s;"/>

        <circle cx="32" cy="168" r="4.5" fill="#E91E63" style="animation:nodePulse 2s ease-in-out infinite 1s;"/>
        <circle cx="32" cy="168" r="7" fill="#E91E63" opacity="0.25" style="animation:nodePulse 2s ease-in-out infinite 1s;"/>

        <circle cx="206" cy="180" r="4.5" fill="#FB923C" style="animation:nodePulse 2s ease-in-out infinite 1.5s;"/>
        <circle cx="206" cy="180" r="7" fill="#FB923C" opacity="0.25" style="animation:nodePulse 2s ease-in-out infinite 1.5s;"/>
      </svg>
    </div>

    <!-- BRAND TEXT -->
    <div class="slide-up" style="animation-delay:0.3s;">
      <div style="font-size:42px; font-weight:700; background:linear-gradient(135deg, #E91E63, #FB923C); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:8px; letter-spacing:-1.2px; line-height:1;">Aida</div>
      <div style="font-size:11px; color:#BE185D; font-weight:700; letter-spacing:3px; text-transform:uppercase; margin-bottom:18px;">Hiểu — Học — Hành động</div>
      <div style="font-size:15px; color:#831447; font-weight:500; line-height:1.55; max-width:260px; margin:0 auto;">
        Mỗi quyết định<br/>đều được kết nối thông minh
      </div>
    </div>

    <!-- BUTTON -->
    <button class="slide-up btn-bump" style="animation-delay:0.5s; margin-top:42px; background:linear-gradient(135deg, #E91E63, #F43F5E); border:none; color:#fff; padding:14px 44px; border-radius:28px; font-size:14px; font-weight:700; box-shadow:0 12px 28px rgba(233,30,99,0.42); letter-spacing:0.3px; display:inline-flex; align-items:center; gap:8px;">
      Bắt đầu
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14M13 18l6-6-6-6"/>
      </svg>
    </button>

    <!-- PAGINATION -->
    <div class="slide-up" style="animation-delay:0.7s; position:absolute; bottom:42px; left:0; right:0; display:flex; justify-content:center; gap:6px;">
      <div style="width:22px; height:3px; background:linear-gradient(90deg, #E91E63, #FB923C); border-radius:2px;"></div>
      <div style="width:6px; height:3px; background:#FBCFE8; border-radius:2px;"></div>
      <div style="width:6px; height:3px; background:#FBCFE8; border-radius:2px;"></div>
    </div>

  </div>

</div>

</body>
</html>
