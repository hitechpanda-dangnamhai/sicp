global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Self-monitor
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # OTel collector self-metrics
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8888']

  # Future: service /metrics endpoints (S-02 add)
