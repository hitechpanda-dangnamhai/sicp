<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Intent 03A — Error</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Be Vietnam Pro', -apple-system, sans-serif;
    background: #FDF2F4;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 24px 14px;
    color: #831447;
  }
  .phone-frame {
    width: 100%;
    max-width: 414px;
    background: linear-gradient(180deg, #FCE7F0 0%, #FEEEE0 40%, #FFF8F0 100%);
    border-radius: 24px;
    overflow: hidden;
    border: 0.5px solid #F9D8E4;
    box-shadow: 0 20px 60px rgba(233,30,99,0.18);
    display: flex;
    flex-direction: column;
    min-height: 844px;
  }
  @media (min-width: 1024px) {
    body { padding: 32px; }
    .phone-frame { box-shadow: 0 32px 80px rgba(233,30,99,0.24); }
  }
  button { font-family: inherit; cursor: pointer; }
  input { font-family: inherit; }

  @keyframes pop { 0%{transform:scale(0.96); opacity:0} 100%{transform:scale(1); opacity:1} }
  @keyframes drift { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-2px)} }
  @keyframes glow { 0%,100%{opacity:0.7; transform:scale(1)} 50%{opacity:1; transform:scale(1.05)} }
  @keyframes slideUp { 0%{transform:translateY(8px); opacity:0} 100%{transform:translateY(0); opacity:1} }
  @keyframes pulseRing { 0%{transform:scale(1); opacity:0.6} 100%{transform:scale(1.6); opacity:0} }
  @keyframes shimmer { 0%{background-position:-200px 0} 100%{background-position:200px 0} }
  @keyframes spin { 100%{transform:rotate(360deg)} }
  @keyframes wave { 0%,100%{transform:scaleY(0.4)} 50%{transform:scaleY(1)} }
  @keyframes barRise { 0%{transform:scaleY(0); opacity:0} 100%{transform:scaleY(1); opacity:1} }
  @keyframes bump { 0%,100%{transform:scale(1)} 30%{transform:scale(1.18)} }
  .pop { animation: pop 0.5s ease-out backwards; }
  .pulse-dot { animation: glow 1.6s ease-in-out infinite; }
  .pulse-ring { animation: pulseRing 2.4s ease-out infinite; }
  .orb-mini { animation: drift 4s ease-in-out infinite; }
  .slide-up { animation: slideUp 0.4s ease-out backwards; }
  .shimmer { background: linear-gradient(90deg, #FCE7F3 0%, #FFF1F5 50%, #FCE7F3 100%); background-size: 400px 100%; animation: shimmer 1.6s linear infinite; }
  .spin { animation: spin 1s linear infinite; }
  .bump { animation: bump 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }

  .grad-text-pink {
    background: linear-gradient(135deg, #E91E63, #FB923C);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .carousel::-webkit-scrollbar { display: none; }
  .carousel { -ms-overflow-style: none; scrollbar-width: none; }

  .ico { width: 1em; height: 1em; display: inline-block; vertical-align: -0.125em; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <symbol id="i-sparkles" viewBox="0 0 24 24"><path d="M16 18a2 2 0 0 1 2 2 2 2 0 0 1 2-2 2 2 0 0 1-2-2 2 2 0 0 1-2 2zM16 4a2 2 0 0 1 2 2 2 2 0 0 1 2-2 2 2 0 0 1-2-2 2 2 0 0 1-2 2zM9 18a4 4 0 0 1 4 4 4 4 0 0 1 4-4 4 4 0 0 1-4-4 4 4 0 0 1-4 4z"/></symbol>
    <symbol id="i-search" viewBox="0 0 24 24"><circle cx="10" cy="10" r="7"/><path d="m21 21-6-6"/></symbol>
    <symbol id="i-bell" viewBox="0 0 24 24"><path d="M10 5a2 2 0 0 1 4 0 7 7 0 0 1 4 6v3a4 4 0 0 0 2 3H4a4 4 0 0 0 2-3v-3a7 7 0 0 1 4-6"/><path d="M9 17v1a3 3 0 0 0 6 0v-1"/></symbol>
    <symbol id="i-camera" viewBox="0 0 24 24"><path d="M5 7h2a2 2 0 0 0 2-2 1 1 0 0 1 1-1h4a1 1 0 0 1 1 1 2 2 0 0 0 2 2h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2"/><circle cx="12" cy="13" r="3"/></symbol>
    <symbol id="i-mic" viewBox="0 0 24 24"><rect x="9" y="2" width="6" height="11" rx="3"/><path d="M5 10a7 7 0 0 0 14 0M8 21h8M12 17v4"/></symbol>
    <symbol id="i-plus" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></symbol>
    <symbol id="i-star" viewBox="0 0 24 24"><path d="M12 17.75 5.83 21l1.18-6.88L2 9.24l6.91-1L12 2l3.09 6.24 6.91 1-5.01 4.88L17.18 21z"/></symbol>
    <symbol id="i-flame" viewBox="0 0 24 24"><path d="M12 12c2-2.96 0-7-1-8 0 3.04-1.95 4.96-4 7-2 2-2 6 0 8 2 1.96 6 1.96 8 0 1-1 2-3 2-5-1 0-3 1-5-2"/></symbol>
    <symbol id="i-trending" viewBox="0 0 24 24"><path d="m3 17 6-6 4 4 8-8M14 7h7v7"/></symbol>
    <symbol id="i-arrow-right" viewBox="0 0 24 24"><path d="M5 12h14M13 18l6-6-6-6"/></symbol>
    <symbol id="i-arrow-down" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></symbol>
    <symbol id="i-x" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></symbol>
    <symbol id="i-home" viewBox="0 0 24 24"><path d="m5 12-2 0 9-9 9 9-2 0M5 12v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-7M9 21v-6a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v6"/></symbol>
    <symbol id="i-message" viewBox="0 0 24 24"><path d="M3 20l1.3-3.9C2.4 13 3.6 8 7.6 6c4-2 9-1 11.4 3 2.4 4 1 9-3 11.4-2.7 1.7-6 1.7-8.7 0z"/></symbol>
    <symbol id="i-inbox" viewBox="0 0 24 24"><path d="M4 13h3l3 3h4l3-3h3M4 13l2-9h12l2 9M4 13v5a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-5"/></symbol>
    <symbol id="i-user" viewBox="0 0 24 24"><circle cx="12" cy="7" r="4"/><path d="M6 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/></symbol>
    <symbol id="i-bottle" viewBox="0 0 24 24"><path d="M10 2h4M10 2v3l-2 2v13a2 2 0 0 0 2 2h4a2 2 0 0 0 2-2V7l-2-2V2"/></symbol>
    <symbol id="i-package" viewBox="0 0 24 24"><path d="m12 3 9 5v8l-9 5-9-5V8z"/><path d="M3 8l9 5 9-5M12 13v10"/></symbol>
    <symbol id="i-filter" viewBox="0 0 24 24"><path d="M4 4h16l-6 8v6l-4 2v-8z"/></symbol>
    <symbol id="i-arrows-sort" viewBox="0 0 24 24"><path d="M3 9l4-4 4 4M7 5v14M21 15l-4 4-4-4M17 5v14"/></symbol>
    <symbol id="i-discount" viewBox="0 0 24 24"><path d="M9 15l6-6M9 9h.01M15 15h.01M5 7c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2v10c0 1.1-.9 2-2 2H7c-1.1 0-2-.9-2-2z"/></symbol>
    <symbol id="i-mood-empty" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M9 10h.01M15 10h.01M9 15h6"/></symbol>
    <symbol id="i-alert" viewBox="0 0 24 24"><path d="M12 9v4M12 17h.01M10.24 3.96 2.5 17a2 2 0 0 0 1.71 3h15.58a2 2 0 0 0 1.71-3L13.76 3.96a2 2 0 0 0-3.52 0z"/></symbol>
    <symbol id="i-refresh" viewBox="0 0 24 24"><path d="M20 11A8.1 8.1 0 0 0 4.5 9M4 5v4h4M4 13a8.1 8.1 0 0 0 15.5 2M20 19v-4h-4"/></symbol>
    <symbol id="i-check" viewBox="0 0 24 24"><path d="M5 12l5 5L20 7"/></symbol>
    <symbol id="i-cart" viewBox="0 0 24 24"><circle cx="6" cy="19" r="2"/><circle cx="17" cy="19" r="2"/><path d="M17 17H6V3H4M6 5l14 1-1 7H6"/></symbol>
    <symbol id="i-wifi-off" viewBox="0 0 24 24"><path d="M3 3l18 18M9.7 9.7A8 8 0 0 0 5 12M16.5 11.5A8 8 0 0 0 12 9M12 17h.01M14 14a3 3 0 0 0-3-3"/></symbol>
    <symbol id="i-history" viewBox="0 0 24 24"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="9"/></symbol>
    <symbol id="i-cube" viewBox="0 0 24 24"><path d="m21 16-9 5-9-5V8l9-5 9 5z"/><path d="m3 8 9 5 9-5M12 13v10"/></symbol>
    <symbol id="i-eye" viewBox="0 0 24 24"><circle cx="12" cy="12" r="2"/><path d="M22 12c-2.7 4.5-6.4 7-10 7s-7.3-2.5-10-7C4.7 7.5 8.4 5 12 5s7.3 2.5 10 7"/></symbol>
    <symbol id="i-users" viewBox="0 0 24 24"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2M16 3a4 4 0 0 1 0 8M21 21v-2a4 4 0 0 0-3-3.85"/></symbol>
    <symbol id="i-target" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1"/></symbol>
    <symbol id="i-lightbulb" viewBox="0 0 24 24"><path d="M9 18h6M10 22h4M9 15a6 6 0 1 1 6 0c-1 1-2 2-2 3v1H11v-1c0-1-1-2-2-3z"/></symbol>
  </defs>
</svg>

<div class="phone-frame">

  <!-- HEADER -->
  <div style="padding:14px 18px 0; display:flex; justify-content:space-between; align-items:center; flex-shrink:0;">
    <div style="display:flex; align-items:center; gap:10px;">
      <button aria-label="Quay lại" style="background:#FFFFFF; border:0.5px solid #FBCFE8; width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#BE185D; box-shadow:0 2px 8px rgba(233,30,99,0.1);">
        <svg class="ico" style="font-size:16px; transform:rotate(180deg)"><use href="#i-arrow-right"/></svg>
      </button>
      <div>
        <div style="font-size:14px; color:#831447; font-weight:700; letter-spacing:-0.2px;">Tìm sản phẩm</div>
        <div style="font-size:10px; color:#BE185D; font-weight:500; display:flex; align-items:center; gap:4px;">
          <span style="width:5px; height:5px; background:#DC2626; border-radius:50%;"></span>
          Kết nối bị gián đoạn
        </div>
      </div>
    </div>
    <div style="display:flex; gap:8px; align-items:center;">
      <button aria-label="Thông báo" style="background:#FFFFFF; border:0.5px solid #FBCFE8; width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; position:relative; color:#BE185D; box-shadow:0 2px 8px rgba(233,30,99,0.1);">
        <svg class="ico" style="font-size:17px"><use href="#i-bell"/></svg>
        <span style="position:absolute; top:5px; right:5px; background:#F97316; width:7px; height:7px; border-radius:50%; border:1.5px solid #fff;"></span>
      </button>
      <div style="width:36px; height:36px; background:linear-gradient(135deg, #FB923C, #EA580C); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; color:#fff; font-weight:500; box-shadow:0 4px 10px rgba(234,88,12,0.25);">AN</div>
    </div>
  </div>

  <!-- CHAT AREA -->
  <div style="flex:1; overflow-y:auto; padding:16px 14px 8px; display:flex; flex-direction:column; gap:14px; position:relative;">

    <div class="pop slide-up" style="display:flex; justify-content:flex-end;">
      <div style="max-width:78%; background:linear-gradient(135deg, #E91E63, #EC4899); color:#fff; padding:10px 14px; border-radius:18px 18px 4px 18px; font-size:14px; font-weight:500; box-shadow:0 6px 14px rgba(233,30,99,0.22); letter-spacing:-0.1px;">
        dầu ăn Tuường An
      </div>
    </div>
    <div class="pop slide-up" style="animation-delay:0.1s; display:flex; gap:8px; align-items:flex-start;">
      <div class="orb-mini" style="width:28px; height:28px; background:radial-gradient(circle at 30% 30%, #FFF 0%, #FFE4E6 40%, #FB923C 100%); border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; box-shadow:0 4px 10px rgba(190,24,93,0.3);">
        <svg class="ico" style="font-size:14px; color:#BE185D;"><use href="#i-sparkles"/></svg>
      </div>
      <div style="max-width:78%; background:#FFFFFF; border:0.5px solid #FBCFE8; padding:10px 14px; border-radius:4px 18px 18px 18px; font-size:13px; color:#831447; font-weight:500; line-height:1.45; box-shadow:0 4px 12px rgba(233,30,99,0.08);">
        Em đang tìm giúp anh...</div>
    </div>
    <div class="pop slide-up" style="animation-delay:0.2s; margin-left:36px;">
      <div style="background:linear-gradient(135deg, #FFFFFF, #FEF3F8); border:0.5px solid #FECACA; border-left:3px solid #DC2626; border-radius:14px; padding:14px 16px; box-shadow:0 6px 16px rgba(220,38,38,0.12);">
        <div style="display:flex; align-items:flex-start; gap:10px; margin-bottom:12px;">
          <div style="width:32px; height:32px; background:linear-gradient(135deg, #FEE2E2, #FCA5A5); border-radius:10px; display:flex; align-items:center; justify-content:center; flex-shrink:0;">
            <svg class="ico" style="font-size:18px; color:#DC2626"><use href="#i-alert"/></svg>
          </div>
          <div style="flex:1;">
            <div style="font-size:13px; color:#831447; font-weight:700; margin-bottom:3px; letter-spacing:-0.1px;">Kết nối bị gián đoạn</div>
            <div style="font-size:11px; color:#9F1239; line-height:1.5;">Em không truy cập được hệ thống tìm kiếm. Có thể do mạng yếu hoặc server tạm thời gián đoạn.</div>
          </div>
        </div>
        <div style="background:#FFFFFF; border:0.5px solid #FCE7F3; border-radius:10px; padding:8px 10px; font-family:'JetBrains Mono', monospace; font-size:10px; color:#9F1239; margin-bottom:12px; display:flex; align-items:center; justify-content:space-between;">
          <span>Mã lỗi: <b style="color:#BE123C;">E_VESPA_TIMEOUT</b></span>
          <span style="color:#9CA3AF;">trace: a3f2...c891</span>
        </div>
        <div style="display:flex; gap:8px;">
          <button style="flex:1; background:linear-gradient(135deg, #E91E63, #F43F5E); border:none; color:#fff; padding:9px 14px; border-radius:11px; font-size:12px; font-weight:600; display:flex; align-items:center; justify-content:center; gap:6px; box-shadow:0 4px 12px rgba(233,30,99,0.28);">
            <svg class="ico" style="font-size:14px"><use href="#i-refresh"/></svg>
            Thử lại
          </button>
          <button style="background:#FFFFFF; border:0.5px solid #FBCFE8; color:#BE185D; padding:9px 12px; border-radius:11px; font-size:12px; font-weight:600;">Báo lỗi</button>
        </div>
      </div>
    </div>
    <div class="pop slide-up" style="animation-delay:0.3s; display:flex; gap:8px; align-items:flex-start;">
      <div class="orb-mini" style="width:28px; height:28px; background:radial-gradient(circle at 30% 30%, #FFF 0%, #FFE4E6 40%, #FB923C 100%); border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; box-shadow:0 4px 10px rgba(190,24,93,0.3);">
        <svg class="ico" style="font-size:14px; color:#BE185D;"><use href="#i-sparkles"/></svg>
      </div>
      <div style="max-width:78%; background:#FFFFFF; border:0.5px solid #FBCFE8; padding:10px 14px; border-radius:4px 18px 18px 18px; font-size:13px; color:#831447; font-weight:500; line-height:1.45; box-shadow:0 4px 12px rgba(233,30,99,0.08);">
        Anh có muốn xem <b style="color:#BE185D;">lịch sử tìm kiếm gần đây</b> trong lúc đợi không?</div>
    </div>
    <div class="pop slide-up" style="animation-delay:0.35s; margin-left:36px;">
      <button style="width:100%; background:#FFFFFF; border:0.5px solid #FBCFE8; padding:10px 14px; border-radius:14px; display:flex; align-items:center; gap:10px; box-shadow:0 4px 10px rgba(233,30,99,0.06); text-align:left;">
        <div style="width:34px; height:34px; background:linear-gradient(135deg, #FCE7F3, #FBCFE8); border-radius:10px; display:flex; align-items:center; justify-content:center; flex-shrink:0;">
          <svg class="ico" style="font-size:17px; color:#BE185D"><use href="#i-history"/></svg>
        </div>
        <div style="flex:1;">
          <div style="font-size:12px; color:#831447; font-weight:600; margin-bottom:2px;">Lịch sử tìm kiếm</div>
          <div style="font-size:10px; color:#9F1239;">5 lần gần nhất · có cache</div>
        </div>
        <svg class="ico" style="font-size:16px; color:#BE185D"><use href="#i-arrow-right"/></svg>
      </button>
    </div>
  </div>

  <!-- INPUT BAR -->
  <div style="padding:10px 14px 10px; flex-shrink:0; position:relative;">

    <div style="display:flex; gap:8px; align-items:center; background:linear-gradient(135deg, #FFFFFF, #FEF3F8); border:0.5px solid #FBCFE8; border-radius:30px; padding:6px 6px 6px 18px; box-shadow:0 10px 26px rgba(233,30,99,0.15);">
      <svg class="ico" style="font-size:18px; color:#E91E63"><use href="#i-sparkles"/></svg>
      <input style="flex:1; background:transparent; border:none; font-size:13px; outline:none; color:#831447;" placeholder="Thử tìm lại..." />
      <button aria-label="Chụp ảnh" style="background:#FCE7F3; border:none; width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#BE185D;">
        <svg class="ico" style="font-size:18px"><use href="#i-camera"/></svg>
      </button>
      <button aria-label="Ghi âm" style="background:linear-gradient(135deg, #E91E63, #F43F5E 50%, #FB923C); border:none; color:#fff; width:42px; height:42px; border-radius:50%; display:flex; align-items:center; justify-content:center; box-shadow:0 10px 22px rgba(233,30,99,0.5);">
        <svg class="ico" style="font-size:20px"><use href="#i-mic"/></svg>
      </button>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <div style="display:flex; padding:8px 4px 12px; background:#FFFFFF; border-top:0.5px solid #FCE7F3; flex-shrink:0;">
    <button style="flex:1; background:transparent; border:none; display:flex; flex-direction:column; align-items:center; gap:3px; padding:4px;">
      <div style="height:3px;"></div>
      <svg class="ico" style="font-size:22px; color:#D1D5DB"><use href="#i-home"/></svg>
      <span style="font-size:10px; color:#9CA3AF;">Trang chính</span>
    </button>
    <button style="flex:1; background:transparent; border:none; display:flex; flex-direction:column; align-items:center; gap:3px; padding:4px; position:relative;">
      <div style="position:absolute; top:-2px; width:22px; height:3px; background:linear-gradient(90deg, #E91E63, #FB923C); border-radius:2px;"></div>
      <svg class="ico" style="font-size:22px; color:#E91E63"><use href="#i-message"/></svg>
      <span style="font-size:10px; color:#BE185D; font-weight:700;">Trò chuyện</span>
    </button>
    <button style="flex:1; background:transparent; border:none; display:flex; flex-direction:column; align-items:center; gap:3px; padding:4px; position:relative;">
      <div style="height:3px;"></div>
      <svg class="ico" style="font-size:22px; color:#D1D5DB"><use href="#i-inbox"/></svg>
      <span style="font-size:10px; color:#9CA3AF;">Đề xuất</span>
      <span style="position:absolute; top:0; right:14px; background:linear-gradient(135deg, #F97316, #EA580C); color:#fff; font-size:10px; min-width:18px; height:18px; border-radius:9px; padding:0 5px; display:flex; align-items:center; justify-content:center; font-weight:700; border:2px solid #fff;">2</span>
    </button>
    <button style="flex:1; background:transparent; border:none; display:flex; flex-direction:column; align-items:center; gap:3px; padding:4px;">
      <div style="height:3px;"></div>
      <svg class="ico" style="font-size:22px; color:#D1D5DB"><use href="#i-user"/></svg>
      <span style="font-size:10px; color:#9CA3AF;">Cửa hàng</span>
    </button>
  </div>

</div>

</body>
</html>
