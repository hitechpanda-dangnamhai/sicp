<!DOCTYPE html>

<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Be Vietnam Pro', -apple-system, sans-serif;
    background: #FDF2F4;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 24px 14px;
    color: #831447;
  }
  .phone-frame {
    width: 100%;
    max-width: 414px;
    background: linear-gradient(180deg, #FCE7F0 0%, #FEEEE0 40%, #FFF8F0 100%);
    border-radius: 24px;
    overflow: hidden;
    border: 0.5px solid #F9D8E4;
    box-shadow: 0 20px 60px rgba(233,30,99,0.18);
    display: flex;
    flex-direction: column;
    min-height: 844px;
    position: relative;
  }
  @media (min-width: 1024px) {
    body { padding: 32px; }
    .phone-frame { box-shadow: 0 32px 80px rgba(233,30,99,0.24); }
  }
  button { font-family: inherit; cursor: pointer; }
  input { font-family: inherit; }

  @keyframes brainGlow { 0%,100%{opacity:0.4; transform:scale(1)} 50%{opacity:0.7; transform:scale(1.06)} }
  @keyframes nodePulse { 0%,100%{transform:scale(1); opacity:0.7} 50%{transform:scale(1.4); opacity:1} }
  @keyframes pop { 0%{transform:scale(0.92); opacity:0} 100%{transform:scale(1); opacity:1} }
  @keyframes slideUp { 0%{transform:translateY(12px); opacity:0} 100%{transform:translateY(0); opacity:1} }
  @keyframes spin { 100%{transform:rotate(360deg)} }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-4px)} 40%,80%{transform:translateX(4px)} }
  @keyframes bumpBtn { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-2px)} }
  @keyframes checkPop { 0%{transform:scale(0)} 60%{transform:scale(1.2)} 100%{transform:scale(1)} }
  @keyframes pulseRing { 0%{transform:scale(1); opacity:0.5} 100%{transform:scale(1.6); opacity:0} }
  @keyframes drift { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }

  .pop { animation: pop 0.6s ease-out backwards; }
  .slide-up { animation: slideUp 0.5s ease-out backwards; }
  .spin { animation: spin 1s linear infinite; }
  .shake { animation: shake 0.5s ease-out; }
  .btn-bump { animation: bumpBtn 2.4s ease-in-out infinite; }
  .check-pop { animation: checkPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
  .pulse-ring { animation: pulseRing 2s ease-out infinite; }
  .drift { animation: drift 4s ease-in-out infinite; }

  .ico { width: 1em; height: 1em; display: inline-block; vertical-align: -0.125em; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
</style>
</head>
