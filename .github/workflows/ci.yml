# =============================================================================
# .github/workflows/ci.yml — ICP CI (HARD gate)
# =============================================================================
# Slice:    S-P0-03/T01 (W-76) — soft→HARD. Every soft-fail (`|| echo`) removed:
#           lint / test / typecheck / coverage / Python ruff+pytest now FAIL the
#           pipeline. No more green-on-broken (the bug this slice exists to kill).
#
# Jobs (plain ubuntu runner, NO service containers):
#   lint        — pnpm lint across gateway/web/workers (workers lint added T01).
#   typecheck   — pnpm typecheck across TS apps.
#   test        — pnpm test:cov (gateway/web/workers) + coverage RATCHET gate.
#   python-lint — ruff check on apps/ai + apps/mcp.
#   python-test — pytest on apps/ai + apps/mcp (full dev deps installed).
#
# DB-dependent paths are intentionally OUT of this core gate:
#   - gateway DB-integration specs opt out unless RUN_DB_TESTS=1 (no PG here).
#   - mcp stock-atomic tests self-skip when no DB is reachable.
#   A CI-Postgres job that runs these with RUN_DB_TESTS=1, the openapi:sync drift
#   gate (needs a running gateway), and the deploy-drift smoke gate all require a
#   compose/service environment and land in T01b. See docs/slices/S-P0-03.md §1.
# =============================================================================

name: CI

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'fix/**'
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # test:cov writes apps/<app>/coverage/coverage-summary.json for the ratchet.
      # gateway runs here too (DB specs self-skip without RUN_DB_TESTS) but its
      # coverage floor is enforced in the integration-db job (full coverage w/ DB).
      - run: pnpm -r run test:cov
      - name: Coverage ratchet — web + workers (DB-free)
        run: node scripts/check-coverage.mjs web workers

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install "ruff>=0.4,<1.0"
      - name: ruff check apps/ai
        working-directory: apps/ai
        run: ruff check src
      - name: ruff check apps/mcp
        working-directory: apps/mcp
        run: ruff check src

  python-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: install + pytest apps/ai
        working-directory: apps/ai
        run: |
          pip install -e ".[dev]"
          pytest -q
      - name: install + pytest apps/mcp
        working-directory: apps/mcp
        run: |
          pip install -e ".[dev]"
          pytest -q

  # S-P0-03/T01b (W-76): tier-2 gate with real Postgres + Redis. Un-skips the 19
  # DB-integration specs (RUN_DB_TESTS=1: gateway auth + tenant-isolation) and runs
  # mcp stock-atomic against a live DB, then ratchets gateway's WITH-DB coverage
  # floor (43). Runs on every push/PR (services are cheap; no compose needed).
  integration-db:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: icp
          POSTGRES_PASSWORD: icp_dev_password
          POSTGRES_DB: icp
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U icp"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql://icp_app:icp_app_dev_password@localhost:5432/icp
      DATABASE_URL_MIGRATE: postgresql://icp:icp_dev_password@localhost:5432/icp
      DATABASE_URL_SUPER: postgresql://icp:icp_dev_password@localhost:5432/icp
      DATABASE_URL_APP: postgresql://icp_app:icp_app_dev_password@localhost:5432/icp
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci_dummy_secret_at_least_32_chars_long_000
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pnpm install --frozen-lockfile
      - name: Apply migrations (superuser) → schema + RLS + icp_app role + DEMO tenant
        run: bash infra/migrations/apply.sh
      - name: Minimal seed (merchant1 only — NOT full W-80 seed)
        run: psql "$DATABASE_URL_MIGRATE" -v ON_ERROR_STOP=1 -f infra/seed/ci-min.sql
      - name: Gateway integration specs (RUN_DB_TESTS=1) + WITH-DB coverage ratchet
        working-directory: apps/gateway
        env:
          RUN_DB_TESTS: '1'
        run: pnpm test:cov
      - name: Coverage ratchet — gateway (with DB)
        run: node scripts/check-coverage.mjs gateway
      - name: MCP stock-atomic against live DB
        working-directory: apps/mcp
        run: |
          pip install -e ".[dev]"
          pytest tests/test_t05_stock_atomic.py -q

  # S-P0-03/T01 (W-76) deploy-drift gate. CONDITIONAL: brings up the full compose
  # stack, so it only runs where a Docker/compose runner exists. Enable by setting
  # repo variable RUN_DEPLOY_SMOKE=true (default off → never reds a plain runner).
  # Builds images with GIT_SHA=${{ github.sha }}, then scripts/smoke-live.sh
  # asserts every container reports that SHA + the core flows serve. See §1.4.
  deploy-smoke:
    if: ${{ vars.RUN_DEPLOY_SMOKE == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build + start stack (GIT_SHA stamped)
        working-directory: infra
        env:
          GIT_SHA: ${{ github.sha }}
        run: docker compose up -d --build
      - name: Deploy-drift + smoke
        env:
          EXPECTED_SHA: ${{ github.sha }}
        run: bash scripts/smoke-live.sh
      - name: Stack logs on failure
        if: failure()
        working-directory: infra
        run: docker compose logs --tail=200
      - name: Tear down
        if: always()
        working-directory: infra
        run: docker compose down -v
