# =============================================================================
# .github/workflows/ci.yml — ICP CI (HARD gate)
# =============================================================================
# Slice:    S-P0-03/T01 (W-76) — soft→HARD. Every soft-fail (`|| echo`) removed:
#           lint / test / typecheck / coverage / Python ruff+pytest now FAIL the
#           pipeline. No more green-on-broken (the bug this slice exists to kill).
#
# Jobs (plain ubuntu runner, NO service containers):
#   lint        — pnpm lint across gateway/web/workers (workers lint added T01).
#   typecheck   — pnpm typecheck across TS apps.
#   test        — pnpm test:cov (gateway/web/workers) + coverage RATCHET gate.
#   python-lint — ruff check on apps/ai + apps/mcp.
#   python-test — pytest on apps/ai + apps/mcp (full dev deps installed).
#
# DB-dependent paths are intentionally OUT of this core gate:
#   - gateway DB-integration specs opt out unless RUN_DB_TESTS=1 (no PG here).
#   - mcp stock-atomic tests self-skip when no DB is reachable.
#   A CI-Postgres job that runs these with RUN_DB_TESTS=1, the openapi:sync drift
#   gate (needs a running gateway), and the deploy-drift smoke gate all require a
#   compose/service environment and land in T01b. See docs/slices/S-P0-03.md §1.
# =============================================================================

name: CI

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'fix/**'
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # @icp/shared-types exports dist-only (no src fallback, dist gitignored) →
      # build TRƯỚC khi vitest resolve, nếu không "Failed to resolve entry" (T01d-hotfix).
      - name: Build @icp/shared-types (consumers resolve ./dist)
        run: pnpm --filter @icp/shared-types build
      # test:cov writes apps/<app>/coverage/coverage-summary.json for the ratchet.
      # gateway runs here too (DB specs self-skip without RUN_DB_TESTS) but its
      # coverage floor is enforced in the integration-db job (full coverage w/ DB).
      - run: pnpm -r run test:cov
      - name: Coverage ratchet — web + workers (DB-free)
        run: node scripts/check-coverage.mjs web workers

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # @icp/shared-types exports dist-only → build TRƯỚC tsc, nếu không TS2307
      # "Cannot find module '@icp/shared-types'" ở consumer (T01d-hotfix).
      - name: Build @icp/shared-types (consumers resolve ./dist)
        run: pnpm --filter @icp/shared-types build
      - run: pnpm typecheck

  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install "ruff>=0.4,<1.0"
      - name: ruff check apps/ai
        working-directory: apps/ai
        run: ruff check src
      - name: ruff check apps/mcp
        working-directory: apps/mcp
        run: ruff check src

  python-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: install + pytest apps/ai
        working-directory: apps/ai
        run: |
          pip install -e ".[dev]"
          pytest -q
      - name: install + pytest apps/mcp
        working-directory: apps/mcp
        run: |
          pip install -e ".[dev]"
          pytest -q

  # S-P0-03/T01b (W-76): tier-2 gate with real Postgres + Redis. Un-skips the 19
  # DB-integration specs (RUN_DB_TESTS=1: gateway auth + tenant-isolation) and runs
  # mcp stock-atomic against a live DB, then ratchets gateway's WITH-DB coverage
  # floor (43). Runs on every push/PR (services are cheap; no compose needed).
  integration-db:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: icp
          POSTGRES_PASSWORD: icp_dev_password
          POSTGRES_DB: icp
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U icp"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql://icp_app:icp_app_dev_password@localhost:5432/icp
      DATABASE_URL_MIGRATE: postgresql://icp:icp_dev_password@localhost:5432/icp
      DATABASE_URL_SUPER: postgresql://icp:icp_dev_password@localhost:5432/icp
      DATABASE_URL_APP: postgresql://icp_app:icp_app_dev_password@localhost:5432/icp
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci_dummy_secret_at_least_32_chars_long_000
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pnpm install --frozen-lockfile
      # @icp/shared-types exports dist-only → build TRƯỚC gateway vitest resolve (T01d-hotfix).
      - name: Build @icp/shared-types (consumers resolve ./dist)
        run: pnpm --filter @icp/shared-types build
      - name: Apply migrations (superuser) → schema + RLS + icp_app role + DEMO tenant
        run: bash infra/migrations/apply.sh
      - name: Minimal seed (merchant1 only — NOT full W-80 seed)
        run: psql "$DATABASE_URL_MIGRATE" -v ON_ERROR_STOP=1 -f infra/seed/ci-min.sql
      - name: Gateway integration specs (RUN_DB_TESTS=1) + WITH-DB coverage ratchet
        working-directory: apps/gateway
        env:
          RUN_DB_TESTS: '1'
        run: pnpm test:cov
      - name: Coverage ratchet — gateway (with DB)
        run: node scripts/check-coverage.mjs gateway
      - name: MCP stock-atomic against live DB
        working-directory: apps/mcp
        run: |
          pip install -e ".[dev]"
          pytest tests/test_t05_stock_atomic.py -q

  # S-P0-03/T01 (W-76) deploy-drift gate. CONDITIONAL: brings up the full compose
  # stack, so it only runs where a Docker/compose runner exists. Enable by setting
  # repo variable RUN_DEPLOY_SMOKE=true (default off → never reds a plain runner).
  # Builds images with GIT_SHA=${{ github.sha }}, then scripts/smoke-live.sh
  # asserts every container reports that SHA + the core flows serve. See §1.4.
  deploy-smoke:
    if: ${{ vars.RUN_DEPLOY_SMOKE == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build + start stack (GIT_SHA stamped)
        working-directory: infra
        env:
          GIT_SHA: ${{ github.sha }}
        run: docker compose up -d --build
      - name: Deploy-drift + smoke
        env:
          EXPECTED_SHA: ${{ github.sha }}
        run: bash scripts/smoke-live.sh
      - name: Stack logs on failure
        if: failure()
        working-directory: infra
        run: docker compose logs --tail=200
      - name: Tear down
        if: always()
        working-directory: infra
        run: docker compose down -v

  # ── S-P0-03/T02c (W-81 + A13 CI): deterministic e2e HARD-GATE (MODE B) ──────
  # Boot web + gateway từ BUILT source (KHÔNG docker compose, KHÔNG conditional)
  # → chạy MỌI push, fail = pipeline fail. Service-container pg+redis (như
  # integration-db). Playwright deterministic specs: auth-flow + cart-flow +
  # dashboard + bugs-regression. EXCLUDE intent-03 (LLM-path, reach-result
  # Vespa-blocked #36 → wire cùng T02b-2 non-blocking live job ADR-056).
  # W-81: cart-flow parse response qua CartSchema (@icp/shared-types) = contract
  # thật (đổi field → e2e đỏ). Flaky-mitigate = health-gate BOOT (retry lúc boot,
  # KHÔNG retry assertion); playwright retries=2 chỉ cho web cold-start, throttle
  # login nới ở CI env để retry KHÔNG cascade 429 (W-60 vẫn test riêng ở unit).
  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: icp
          POSTGRES_PASSWORD: icp_dev_password
          POSTGRES_DB: icp
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U icp"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      # Gateway runtime (icp_app role, RLS-enforced) + migrate superuser (apply.sh
      # ưu tiên DATABASE_URL_MIGRATE; cần CẢ HAI set — mirror integration-db).
      DATABASE_URL: postgresql://icp_app:icp_app_dev_password@localhost:5432/icp
      DATABASE_URL_MIGRATE: postgresql://icp:icp_dev_password@localhost:5432/icp
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci_dummy_secret_at_least_32_chars_long_000
      NODE_ENV: test
      PORT: '3001'
      # Web same-origin proxy → gateway (next.config rewrites GATEWAY_PROXY_TARGET).
      GATEWAY_PROXY_TARGET: http://localhost:3001
      # e2e-cleanup direct psql/redis-cli (MODE B) — superuser DB + redis.
      E2E_CLEANUP_DB_URL: postgresql://icp:icp_dev_password@localhost:5432/icp
      # Nới throttle login CI: setup(1)+auth-flow(3)=4 logins; playwright retry=2
      # có thể đẩy >5/min → 429 cascade. Throttle semantics test riêng ở unit.
      THROTTLE_LOGIN_LIMIT: '50'
      THROTTLE_LOGIN_HOURLY_LIMIT: '200'
      # ADR-056 (MODE B mở rộng): cart 7-route → MCP (cart.service.ts thin JSON-RPC
      # client) → e2e boot-from-source GỒM Python MCP. Gateway trỏ MCP localhost.
      MCP_URL: http://localhost:5050/rpc
      # MCP cart fixtures (promo/free-gift) — repo path (mặc định /app/... là container).
      PROMO_FIXTURE_PATH: ${{ github.workspace }}/infra/seed/promo_codes.json
      FREE_GIFT_FIXTURE_PATH: ${{ github.workspace }}/infra/seed/free_gift_rules.json
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pnpm install --frozen-lockfile
      - name: Install MCP (Python, boot-from-source) — cart 7-route → MCP (ADR-056)
        working-directory: apps/mcp
        run: pip install -e .
      - name: redis-tools (e2e-cleanup Redis wipe — determinism)
        run: sudo apt-get update && sudo apt-get install -y redis-tools
      - name: Apply migrations (superuser) → schema + RLS + icp_app + DEMO tenant
        run: bash infra/migrations/apply.sh
      - name: Minimal seed (merchant1 + demo2 + customer1 + e2e00001 product)
        run: psql "$DATABASE_URL_MIGRATE" -v ON_ERROR_STOP=1 -f infra/seed/ci-min.sql
      - name: Build shared-types + gateway + web (dep-order; KHÔNG kéo workers/ai)
        run: pnpm --filter @icp/shared-types --filter @icp/gateway --filter @icp/web build
      - name: Install Playwright Chromium
        working-directory: apps/web
        run: pnpm exec playwright install --with-deps chromium
      - name: Boot MCP + gateway (built) → health-gate → deterministic e2e
        # ADR-056 (MODE B mở rộng): MCP (Flask) + gateway + playwright CÙNG step →
        # cả 2 sống suốt test run. cart 7-route → MCP (cart.service.ts thin JSON-RPC).
        # MCP boot-from-source `python -m src.server` (deps pip -e). health-gate /health
        # (liveness — no-dep) retry lúc BOOT, KHÔNG retry assertion. playwright tự boot
        # web. MCP/gateway boot fail = job đỏ THẬT (KHÔNG mask/silent-skip — §0.5).
        run: |
          ( cd apps/mcp && PYTHONPATH=. python -m src.server --host 127.0.0.1 --port 5050 ) > /tmp/mcp.log 2>&1 &
          MCP=$!
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:5050/health || true)
            [ "$code" = "200" ] && { echo "mcp ready (${i}s)"; break; }
            [ "$i" = "60" ] && { echo "mcp boot FAILED"; cat /tmp/mcp.log; exit 1; }
            sleep 1
          done
          node apps/gateway/dist/main.js > /tmp/gateway.log 2>&1 &
          GW=$!
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3001/api/v1/health || true)
            [ "$code" = "200" ] && { echo "gateway ready (${i}s)"; break; }
            [ "$i" = "60" ] && { echo "gateway boot FAILED"; cat /tmp/gateway.log; exit 1; }
            sleep 1
          done
          make e2e-cleanup
          set +e
          ( cd apps/web && pnpm exec playwright test \
              auth-flow.spec.ts cart-flow.spec.ts dashboard.spec.ts bugs-regression.spec.ts )
          RC=$?
          set -e
          kill "$GW" "$MCP" 2>/dev/null || true
          exit $RC
      - name: MCP log on failure
        if: failure()
        run: cat /tmp/mcp.log || true
      - name: Gateway log on failure
        if: failure()
        run: cat /tmp/gateway.log || true
      - name: Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7
          if-no-files-found: ignore
