name: guards
on:
  push:
    branches: [main]
  pull_request:

jobs:
  tenant-route-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # S-P0-01 T02b-3 (ADR-046 amend d): 0 hardcoded tenant route /home|/intent-<n>
      # ngoài tenantHref() + middleware LEGACY_REDIRECTS. Nav tenant-scoped phải
      # carry slug /s/<slug>. Nguồn: docs/slices/S-P0-01.md T02b-3.
      - name: Gate hardcoded tenant routes
        run: bash scripts/gate-tenant-routes.sh

  facts-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Regenerate FACTS & diff (bỏ header + section DB — CI không có DB)
        run: |
          cp docs/FACTS.md /tmp/committed.md
          bash scripts/gen-facts.sh
          strip() { awk '/^# FACTS — generated/{next} /^## DB/{skip=1} /^## Frontend/{skip=0} skip{next} {print}' "$1"; }
          strip /tmp/committed.md > /tmp/a.md
          strip docs/FACTS.md   > /tmp/b.md
          if diff -u /tmp/a.md /tmp/b.md; then
            echo "FACTS OK — không drift"
          else
            echo "::error::FACTS.md STALE so với code — chạy 'bash scripts/gen-facts.sh' rồi commit lại"
            exit 1
          fi

  commit-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Lint commit messages (taxonomy v2)
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            RANGE="origin/${{ github.base_ref }}..HEAD"
          elif [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            RANGE="HEAD~1..HEAD"
          else
            RANGE="${{ github.event.before }}..${{ github.sha }}"
          fi
          git log --format=%s "$RANGE" | while read -r s; do
            echo "check: $s"
            # taxonomy v3: slice id cho phép prefix chữ + nhiều đoạn (S-P0-01,
            # S-META-02, S-AUDIT) — không chỉ S-<số>. WHY: BACKLOG §2 đặt tên
            # slice theo priority (P0). Nguồn: docs/ICP_PLAYBOOK_V2.2.md R0.1-a.
            # taxonomy v3.1: task id cho phép hậu tố chữ + nhánh con (T02b-1) —
            # không chỉ T<số>. WHY: slice tách task phức tạp thành T0Nx-M
            # (S-P0-01 đặt T02b → T02b-1/2/3). Nguồn: docs/slices/S-P0-01.md.
            echo "$s" | grep -qE '^(S-[A-Z0-9]+(-[A-Z0-9]+)*/(T[0-9]+[a-z]?(-[0-9]+)?|HOTFIX-[0-9]+|REFACTOR-[0-9]+)|META): .+' \
              || { echo "::error::Commit sai format taxonomy: '$s'"; exit 1; }
          done

  openapi-drift:
    # S-P0-03/T01 (W-46): regenerate the OpenAPI contract from the gateway and
    # fail on drift — a DTO/decorator change without `pnpm openapi:sync` = FAIL.
    # The gateway's EXPORT_OPENAPI=true path builds the Swagger doc and writes the
    # file BEFORE any DB/Redis connection (pg.Pool is lazy), so this runs on a
    # plain runner with dummy (format-valid) env — no compose needed.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build gateway
        run: pnpm --filter @icp/gateway build
      - name: Export OpenAPI from gateway (standalone, dummy env)
        working-directory: apps/gateway
        env:
          EXPORT_OPENAPI: 'true'
          NODE_ENV: test
          DATABASE_URL: postgres://u:p@localhost:5432/db
          DATABASE_URL_MIGRATE: postgres://u:p@localhost:5432/db
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci_dummy_secret_at_least_32_chars_long_000
        run: node dist/main.js
      - name: Regenerate typed client from OpenAPI
        run: pnpm openapi:generate
      - name: Fail on contract drift
        run: |
          if git diff --exit-code packages/shared-types/openapi.json packages/shared-types/src/api/; then
            echo "OpenAPI contract in sync."
          else
            echo "::error::OpenAPI drift — DTO/decorator changed without 'pnpm openapi:sync'. Run it and commit packages/shared-types/."
            exit 1
          fi
