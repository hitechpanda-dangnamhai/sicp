# pnpm workspaces declaration
# Patterns critical:
#   - `packages/*` (plural) — T02 sẽ init `packages/shared-types`, resolve qua
#     `@icp/shared-types`. Singular `package/*` typo sẽ break workspace resolution.
#   - `apps/*` — T02 init `apps/workers`, T03 stub `apps/{gateway,ai,mcp,web}`.
#   - `infra/seed` — added per C14 Amendment (Phiên 8 2026-05-18 Path B). Allows
#     root `pnpm install` to install seed deps (pg/bcryptjs/dotenv/tsx) and
#     `pnpm --filter @icp/seed run seed` to resolve from Makefile target.
#     See decisions-log.md C14 amendment.
# Source: docs/00_CONTEXT.md Section 1 repo layout.

packages:
  - "apps/*"
  - "packages/*"
  - "infra/seed"
